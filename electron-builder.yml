# electron-builder packaging config — present for the future (M-late).
# DO NOT build an installer yet; this is config only.
appId: be.timeogilson.cockpit
productName: Cockpit
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - resources/**/*
  - package.json
# node-pty's native addon + ConPTY/winpty binaries can't be require()'d from
# inside app.asar — ship them unpacked so the prebuilt .node/.dll/.exe load.
asarUnpack:
  - "**/node_modules/node-pty/**"
win:
  target:
    - nsis
  icon: resources/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish: null
